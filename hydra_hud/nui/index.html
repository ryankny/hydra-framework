<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/hud.css">
    <link rel="stylesheet" href="css/vehicle.css">
    <link rel="stylesheet" href="css/navigation.css">
</head>
<body style="display: none;">
    <!-- Navigation Bar (top center) -->
    <div id="hud-navigation" class="hud-nav hidden">
        <div class="nav-inner">
            <div class="nav-compass">
                <div class="nav-compass-strip" id="compass-strip"></div>
            </div>
            <div class="nav-info">
                <div class="nav-location">
                    <span id="nav-street" class="nav-street"></span>
                    <span id="nav-crossing" class="nav-crossing"></span>
                </div>
                <div class="nav-meta">
                    <span id="nav-zone" class="nav-zone"></span>
                    <span class="nav-separator">|</span>
                    <span id="nav-direction" class="nav-direction"></span>
                    <span class="nav-separator">|</span>
                    <span id="nav-time" class="nav-time"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Player Status (bottom left, above minimap) -->
    <div id="hud-player" class="hud-player hidden">
        <div class="player-vitals">
            <div class="vital-bar" id="vital-health">
                <div class="vital-icon" id="icon-health"></div>
                <div class="vital-track"><div class="vital-fill health-fill"></div></div>
            </div>
            <div class="vital-bar" id="vital-armor" style="display:none">
                <div class="vital-icon" id="icon-armor"></div>
                <div class="vital-track"><div class="vital-fill armor-fill"></div></div>
            </div>
            <div class="vital-bar" id="vital-hunger">
                <div class="vital-icon" id="icon-hunger"></div>
                <div class="vital-track"><div class="vital-fill hunger-fill"></div></div>
            </div>
            <div class="vital-bar" id="vital-thirst">
                <div class="vital-icon" id="icon-thirst"></div>
                <div class="vital-track"><div class="vital-fill thirst-fill"></div></div>
            </div>
            <div class="vital-bar" id="vital-oxygen" style="display:none">
                <div class="vital-icon" id="icon-oxygen"></div>
                <div class="vital-track"><div class="vital-fill oxygen-fill"></div></div>
            </div>
        </div>
        <div class="player-info">
            <div class="player-money" id="player-money">
                <div class="money-item cash">
                    <span class="money-label">CASH</span>
                    <span class="money-value" id="money-cash">$0</span>
                </div>
                <div class="money-item bank">
                    <span class="money-label">BANK</span>
                    <span class="money-value" id="money-bank">$0</span>
                </div>
            </div>
            <div class="player-job" id="player-job">
                <span class="job-label" id="job-label">Unemployed</span>
            </div>
        </div>
    </div>

    <!-- Vehicle HUD (bottom right) -->
    <div id="hud-vehicle" class="hud-vehicle" style="display:none">
        <!-- Circular Speedometer -->
        <div class="speedo-container">
            <svg class="speedo-ring" viewBox="0 0 160 160">
                <!-- Background arc -->
                <circle class="speedo-bg" cx="80" cy="80" r="70" />
                <!-- Speed arc (animated via stroke-dashoffset) -->
                <circle class="speedo-fill" id="speedo-arc" cx="80" cy="80" r="70" />
                <!-- RPM arc (inner ring) -->
                <circle class="speedo-rpm-bg" cx="80" cy="80" r="58" />
                <circle class="speedo-rpm-fill" id="speedo-rpm-arc" cx="80" cy="80" r="58" />
            </svg>
            <div class="speedo-center">
                <div class="speed-value" id="veh-speed">0</div>
                <div class="speed-unit" id="veh-speed-unit">MPH</div>
                <div class="gear-display" id="veh-gear">N</div>
            </div>
        </div>

        <!-- Vehicle stats -->
        <div class="vehicle-stats">
            <div class="veh-stat" id="veh-fuel-container">
                <div class="veh-stat-icon fuel-icon"></div>
                <div class="veh-stat-bar"><div class="veh-stat-fill fuel-fill" id="veh-fuel-fill"></div></div>
                <span class="veh-stat-value" id="veh-fuel-value">100</span>
            </div>
            <div class="veh-stat" id="veh-engine-container">
                <div class="veh-stat-icon engine-icon"></div>
                <div class="veh-stat-bar"><div class="veh-stat-fill engine-fill" id="veh-engine-fill"></div></div>
                <span class="veh-stat-value" id="veh-engine-value">100</span>
            </div>
        </div>

        <!-- Status indicators -->
        <div class="vehicle-indicators">
            <div class="indicator" id="ind-seatbelt" title="Seatbelt">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><path d="M12 8v8"/><path d="M8 21l4-5 4 5"/></svg>
            </div>
            <div class="indicator" id="ind-lock" title="Locked">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <div class="indicator" id="ind-lights" title="Lights">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </div>
            <div class="indicator" id="ind-engine" title="Engine">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/></svg>
            </div>
        </div>

        <!-- Aircraft-specific overlay -->
        <div class="vehicle-aircraft" id="veh-aircraft" style="display:none">
            <div class="aircraft-stat">
                <span class="aircraft-label">ALT</span>
                <span class="aircraft-value" id="veh-altitude">0</span>
                <span class="aircraft-unit">FT</span>
            </div>
            <div class="aircraft-stat">
                <span class="aircraft-label">VS</span>
                <span class="aircraft-value" id="veh-vspeed">0</span>
                <span class="aircraft-unit">FPM</span>
            </div>
            <div class="aircraft-stat">
                <span class="aircraft-label">HDG</span>
                <span class="aircraft-value" id="veh-heading">0</span>
                <span class="aircraft-unit">&deg;</span>
            </div>
        </div>

        <!-- Boat-specific overlay -->
        <div class="vehicle-boat" id="veh-boat" style="display:none">
            <div class="indicator" id="ind-anchor" title="Anchor">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/><path d="M5 12a7 7 0 0 0 14 0"/></svg>
            </div>
        </div>
    </div>

    <script src="js/hud.js"></script>
    <script src="js/vehicle.js"></script>
    <script src="js/navigation.js"></script>
</body>
</html>
