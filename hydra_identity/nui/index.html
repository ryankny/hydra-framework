<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/identity.css">
</head>
<body>
    <div id="identity-root">
        <!-- ===== CHARACTER SELECTION SCREEN ===== -->
        <div id="screen-selection" class="screen hidden">
            <div class="selection-container">
                <div class="selection-header">
                    <div class="brand">
                        <span class="brand-icon">&#9670;</span>
                        <h1>Select Character</h1>
                    </div>
                    <p class="subtitle">Choose a character to continue or create a new one</p>
                </div>

                <div id="character-grid" class="character-grid">
                    <!-- Character cards injected by JS -->
                </div>

                <div id="spawn-picker" class="spawn-picker hidden">
                    <h3>Choose Spawn Location</h3>
                    <div id="spawn-locations" class="spawn-locations">
                        <!-- Spawn location cards injected by JS -->
                    </div>
                    <div class="spawn-actions">
                        <button class="btn btn-ghost" id="btn-spawn-back">Back</button>
                        <button class="btn btn-primary" id="btn-spawn-confirm" disabled>Confirm Spawn</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== CHARACTER CREATION SCREEN ===== -->
        <div id="screen-creation" class="screen hidden">
            <div class="creation-panel">
                <div class="creation-header">
                    <button class="btn-back" id="btn-creation-back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <div>
                        <h2>Create Character</h2>
                        <p class="subtitle">Fill in your character details</p>
                    </div>
                </div>

                <form id="creation-form" class="creation-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="input-firstname">First Name</label>
                            <input type="text" id="input-firstname" placeholder="John" maxlength="24" required>
                        </div>
                        <div class="form-group">
                            <label for="input-lastname">Last Name</label>
                            <input type="text" id="input-lastname" placeholder="Doe" maxlength="24" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Sex</label>
                        <div class="sex-toggle">
                            <button type="button" class="sex-btn active" data-sex="male">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="14" r="5"/><path d="M19 5l-5.4 5.4"/><path d="M15 5h4v4"/></svg>
                                Male
                            </button>
                            <button type="button" class="sex-btn" data-sex="female">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="5"/><path d="M12 15v7"/><path d="M9 19h6"/></svg>
                                Female
                            </button>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="input-dob">Date of Birth</label>
                            <input type="date" id="input-dob" value="1990-01-01">
                        </div>
                        <div class="form-group">
                            <label for="input-nationality">Nationality</label>
                            <select id="input-nationality">
                                <!-- Options injected by JS -->
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        Continue to Appearance
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- ===== APPEARANCE SCREEN ===== -->
        <div id="screen-appearance" class="screen hidden">
            <div class="appearance-panel">
                <div class="appearance-header">
                    <button class="btn-back" id="btn-appearance-back">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <div>
                        <h2>Customize Appearance</h2>
                        <p class="subtitle">Style your character</p>
                    </div>
                </div>

                <div class="appearance-tabs">
                    <button class="tab-btn active" data-tab="face">Face</button>
                    <button class="tab-btn" data-tab="hair">Hair</button>
                    <button class="tab-btn" data-tab="overlays">Features</button>
                    <button class="tab-btn" data-tab="clothing">Clothing</button>
                </div>

                <div class="appearance-content" id="appearance-content">
                    <!-- Tab content injected by JS -->
                </div>

                <div class="appearance-controls">
                    <div class="camera-controls">
                        <button class="btn-icon" id="btn-cam-up" title="Camera Up">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                        </button>
                        <div class="rotate-controls">
                            <button class="btn-icon" id="btn-rotate-left" title="Rotate Left">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                            </button>
                            <button class="btn-icon" id="btn-rotate-right" title="Rotate Right">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                            </button>
                        </div>
                        <button class="btn-icon" id="btn-cam-down" title="Camera Down">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                    </div>
                    <p class="camera-hint">Scroll to rotate</p>
                    <button class="btn btn-primary" id="btn-finish">
                        Create Character
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== DELETE CONFIRMATION MODAL ===== -->
        <div id="modal-delete" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content glass-card">
                <div class="modal-icon danger">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </div>
                <h3>Delete Character</h3>
                <p>Are you sure? This action cannot be undone.</p>
                <p id="delete-char-name" class="delete-char-name"></p>
                <div class="modal-actions">
                    <button class="btn btn-ghost" id="btn-delete-cancel">Cancel</button>
                    <button class="btn btn-danger" id="btn-delete-confirm">Delete</button>
                </div>
            </div>
        </div>

        <!-- ===== ERROR TOAST ===== -->
        <div id="error-toast" class="error-toast hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="error-toast-msg"></span>
        </div>
    </div>

    <svg id="cursor" style="position:fixed;top:0;left:0;width:20px;height:20px;pointer-events:none;z-index:2147483647;will-change:transform;transform:translate3d(-50px,-50px,0)" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M3 1L3 16L7.5 11.5L11.5 18L14 16.8L10 10.5L16 10.5Z" fill="#fff" stroke="#000" stroke-width="1" stroke-linejoin="round"/></svg>
    <script>!function(){var c=document.getElementById("cursor"),x=-50,y=-50;document.addEventListener("mousemove",function(e){x=e.clientX;y=e.clientY});!function t(){c.style.transform="translate3d("+x+"px,"+y+"px,0)";requestAnimationFrame(t)}()}()</script>
    <script src="js/identity.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/creation.js"></script>
    <script src="js/appearance.js"></script>
</body>
</html>
