$engine: 3
$onesync: on

name: Hydra Framework
version: 1.0.0
author: Hydra Labs
description: >
  A modular, standalone FiveM framework with 35+ modules including
  anti-cheat, HUD, identity, weather, world management, and more.
  No ESX/QBCore dependency required — includes a bridge for compatibility.

tasks:
  # ── Download CFX default resources ───────────────────────────
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    subpath: resources
    dest: ./resources/[cfx-default]

  # ── Download oxmysql (built release) ─────────────────────────
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    dest: ./tmp/oxmysql.zip

  - action: unzip
    src: ./tmp/oxmysql.zip
    dest: ./resources/[standalone]

  - action: remove_path
    path: ./tmp/oxmysql.zip

  # ── Download Hydra Framework to temp location ────────────────
  - action: download_github
    src: https://github.com/ryankny/hydra-framework
    ref: master
    dest: ./tmp/hydra-framework

  # ── Move hydra_core into [hydra] bracket folder ──────────────
  - action: move_path
    src: ./tmp/hydra-framework/hydra_core
    dest: ./resources/[hydra]/hydra_core

  # ── Move each module from modules/ into [hydra] ──────────────
  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_anims
    dest: ./resources/[hydra]/hydra_anims

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_anticheat
    dest: ./resources/[hydra]/hydra_anticheat

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_audio
    dest: ./resources/[hydra]/hydra_audio

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_blips
    dest: ./resources/[hydra]/hydra_blips

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_bridge
    dest: ./resources/[hydra]/hydra_bridge

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_camera
    dest: ./resources/[hydra]/hydra_camera

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_chat
    dest: ./resources/[hydra]/hydra_chat

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_commands
    dest: ./resources/[hydra]/hydra_commands

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_context
    dest: ./resources/[hydra]/hydra_context

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_data
    dest: ./resources/[hydra]/hydra_data

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_death
    dest: ./resources/[hydra]/hydra_death

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_doorlock
    dest: ./resources/[hydra]/hydra_doorlock

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_emotes
    dest: ./resources/[hydra]/hydra_emotes

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_hud
    dest: ./resources/[hydra]/hydra_hud

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_identity
    dest: ./resources/[hydra]/hydra_identity

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_input
    dest: ./resources/[hydra]/hydra_input

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_interact
    dest: ./resources/[hydra]/hydra_interact

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_inventory
    dest: ./resources/[hydra]/hydra_inventory

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_keybinds
    dest: ./resources/[hydra]/hydra_keybinds

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_loadingscreen
    dest: ./resources/[hydra]/hydra_loadingscreen

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_logs
    dest: ./resources/[hydra]/hydra_logs

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_markers
    dest: ./resources/[hydra]/hydra_markers

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_notify
    dest: ./resources/[hydra]/hydra_notify

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_npc
    dest: ./resources/[hydra]/hydra_npc

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_object
    dest: ./resources/[hydra]/hydra_object

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_physics
    dest: ./resources/[hydra]/hydra_physics

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_players
    dest: ./resources/[hydra]/hydra_players

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_progressbar
    dest: ./resources/[hydra]/hydra_progressbar

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_scenes
    dest: ./resources/[hydra]/hydra_scenes

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_status
    dest: ./resources/[hydra]/hydra_status

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_target
    dest: ./resources/[hydra]/hydra_target

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_ui
    dest: ./resources/[hydra]/hydra_ui

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_weather
    dest: ./resources/[hydra]/hydra_weather

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_world
    dest: ./resources/[hydra]/hydra_world

  - action: move_path
    src: ./tmp/hydra-framework/modules/hydra_zones
    dest: ./resources/[hydra]/hydra_zones

  # ── Keep SQL for reference ───────────────────────────────────
  - action: move_path
    src: ./tmp/hydra-framework/sql
    dest: ./resources/[hydra]/sql

  # ── Clean up temp download ───────────────────────────────────
  - action: remove_path
    path: ./tmp/hydra-framework

  # ── Import SQL schema ────────────────────────────────────────
  - action: connect_database

  - action: query_database
    file: ./resources/[hydra]/sql/hydra_install.sql

  # ── Write server.cfg ─────────────────────────────────────────
  - action: write_file
    file: server.cfg
    data: |
      # ============================================
      # Hydra Framework — Generated by txAdmin Recipe
      # ============================================

      # ---- Endpoints ----
      endpoint_add_tcp "0.0.0.0:30120"
      endpoint_add_udp "0.0.0.0:30120"

      # ---- Server Identity ----
      sv_hostname "Hydra Framework Server"
      sv_maxclients {{maxClients}}
      sets sv_projectName "Hydra Framework"
      sets sv_projectDesc "Powered by Hydra Framework"
      set sv_enforceGameBuild 3258

      sv_licenseKey "{{svLicense}}"
      #set steam_webApiKey "changeme"

      # ---- Database ----
      set mysql_connection_string "{{dbConnectionString}}"

      # ---- Hydra Configuration ----
      #set hydra_locale "en"
      #set hydra_debug "false"
      #set hydra_log_level "info"
      #set hydra_rate_limit "50"
      #set hydra_exploit_protection "true"
      #set hydra_maintenance "false"
      #set hydra_bridge_mode ""
      #set hydra_db_adapter "mysql"

      # ---- CFX Default Resources ----
      ensure mapmanager
      ensure spawnmanager
      ensure sessionmanager
      ensure hardcap

      # ---- Database Driver ----
      ensure oxmysql

      # ---- Hydra Framework (start order matters) ----
      ensure hydra_loadingscreen
      ensure hydra_core
      ensure hydra_data
      ensure hydra_bridge
      ensure hydra_players
      ensure hydra_ui
      ensure hydra_notify
      ensure hydra_hud
      ensure hydra_identity
      ensure hydra_progressbar
      ensure hydra_input
      ensure hydra_context
      ensure hydra_weather
      ensure hydra_logs
      ensure hydra_chat
      ensure hydra_target
      ensure hydra_zones
      ensure hydra_blips
      ensure hydra_status
      ensure hydra_death
      ensure hydra_emotes
      ensure hydra_world
      ensure hydra_physics
      ensure hydra_doorlock
      ensure hydra_inventory
      ensure hydra_anticheat
      ensure hydra_commands
      ensure hydra_keybinds
      ensure hydra_npc
      ensure hydra_markers
      ensure hydra_scenes
      ensure hydra_anims
      ensure hydra_audio
      ensure hydra_camera
      ensure hydra_interact
      ensure hydra_object

      # ---- Your Scripts Below ----
      # ensure my_custom_script

      # ---- ACE Permissions ----
      add_ace group.admin command allow
      add_ace group.admin hydra.admin allow
      add_ace group.admin hydra.admin.manage allow
      add_ace group.admin hydra.admin.players allow
      add_ace group.admin hydra.admin.kick allow
      add_ace group.admin hydra.admin.ban allow
      add_ace group.admin hydra.admin.maintenance allow
      add_ace group.admin command.hydra allow

  # ── Done ─────────────────────────────────────────────────────
  - action: waste_time
    seconds: 5
