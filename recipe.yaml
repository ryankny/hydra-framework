$engine: 1

name: Hydra Framework
version: 1.0.0
author: Hydra Labs
description: >
  A modular, standalone FiveM framework with 35+ modules including
  anti-cheat, HUD, identity, weather, world management, and more.
  No ESX/QBCore dependency required — includes a bridge for compatibility.

variables:
  - name: svLicense
    label: Server License Key
    description: Your cfx.re server license key (https://keymaster.fivem.net)
    type: input
    required: true
  - name: dbHost
    label: Database Host
    default: localhost
  - name: dbName
    label: Database Name
    default: hydra
  - name: dbUser
    label: Database User
    default: root
  - name: dbPassword
    label: Database Password
    type: password
    required: true
  - name: steamWebApiKey
    label: Steam Web API Key
    description: Get one at https://steamcommunity.com/dev/apikey (optional, recommended)
    default: none

tasks:
  # ── Download CFG base artifacts ──────────────────────────────
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    ref: master
    subpath: resources
    dest: ./resources/[cfx-default]

  # ── Download oxmysql (required database driver) ──────────────
  - action: download_github
    src: https://github.com/overextended/oxmysql
    ref: main
    dest: ./resources/[standalone]/oxmysql

  # ── Download Hydra Framework ─────────────────────────────────
  - action: download_github
    src: https://github.com/ryankny/hydra-framework
    ref: master
    dest: ./resources/[hydra]

  # ── Move hydra_core to top-level inside [hydra] ─────────────
  - action: move_path
    src: ./resources/[hydra]/hydra_core
    dest: ./resources/[hydra]/hydra_core

  # ── Move all modules into [hydra] folder ─────────────────────
  - action: move_path
    src: ./resources/[hydra]/modules/
    dest: ./resources/[hydra]/modules/

  # ── Import SQL schema ────────────────────────────────────────
  - action: query_database
    file: ./resources/[hydra]/sql/hydra_install.sql

  # ── Write server.cfg ─────────────────────────────────────────
  - action: write_file
    path: server.cfg
    content: |
      # ============================================
      # Hydra Framework — Generated by txAdmin Recipe
      # ============================================

      # ---- Server Identity ----
      sv_hostname "Hydra Framework Server"
      sv_maxclients 48
      sets sv_projectName "Hydra Framework"
      sets sv_projectDesc "Powered by Hydra Framework"
      set sv_enforceGameBuild 3258

      sv_licenseKey "{{svLicense}}"
      set steam_webApiKey "{{steamWebApiKey}}"

      # ---- Database ----
      set mysql_connection_string "mysql://{{dbUser}}:{{dbPassword}}@{{dbHost}}/{{dbName}}?charset=utf8mb4"

      # ---- Hydra Configuration ----
      #set hydra_locale "en"
      #set hydra_debug "false"
      #set hydra_log_level "info"
      #set hydra_rate_limit "50"
      #set hydra_exploit_protection "true"
      #set hydra_maintenance "false"
      #set hydra_bridge_mode ""
      #set hydra_db_adapter "mysql"

      # ---- CFX Default Resources ----
      ensure mapmanager
      ensure spawnmanager
      ensure sessionmanager
      ensure chat
      ensure hardcap

      # ---- Database Driver ----
      ensure oxmysql

      # ---- Hydra Framework (start order matters) ----
      ensure hydra_loadingscreen
      ensure hydra_core
      ensure hydra_data
      ensure hydra_bridge
      ensure hydra_players
      ensure hydra_ui
      ensure hydra_notify
      ensure hydra_hud
      ensure hydra_identity
      ensure hydra_progressbar
      ensure hydra_input
      ensure hydra_context
      ensure hydra_weather
      ensure hydra_logs
      ensure hydra_chat
      ensure hydra_target
      ensure hydra_zones
      ensure hydra_blips
      ensure hydra_status
      ensure hydra_death
      ensure hydra_emotes
      ensure hydra_world
      ensure hydra_physics
      ensure hydra_doorlock
      ensure hydra_inventory
      ensure hydra_anticheat
      ensure hydra_commands
      ensure hydra_keybinds
      ensure hydra_npc
      ensure hydra_markers
      ensure hydra_scenes
      ensure hydra_anims
      ensure hydra_audio
      ensure hydra_camera
      ensure hydra_interact
      ensure hydra_object

      # ---- Your Scripts Below ----
      # ensure my_custom_script

      # ---- ACE Permissions ----
      add_ace group.admin command allow
      add_ace group.admin hydra.admin allow
      add_ace group.admin hydra.admin.manage allow
      add_ace group.admin hydra.admin.players allow
      add_ace group.admin hydra.admin.kick allow
      add_ace group.admin hydra.admin.ban allow
      add_ace group.admin hydra.admin.maintenance allow
      add_ace group.admin command.hydra allow

  # ── Done ─────────────────────────────────────────────────────
  - action: waste_time
    seconds: 5

  - action: done
    message: >
      Hydra Framework has been installed successfully!
      Start your server from the txAdmin panel.
      Check the Hydra docs for configuration options.
